name: Flaky Tests Analysis

env:
  FLAKY_TESTS_FAILURE_RATE_THRESHOLD: "20.0"

on:
  workflow_call:
    inputs:
      suite-name:
        description: "Summary heading (e.g., E2E, Jest, Backend)"
        type: string
        required: true
      junit-artifact-pattern:
        description: "Download pattern for JUnit reports"
        type: string
        required: true
      screenshot-artifact-pattern:
        description: "Download pattern for screenshot artifacts"
        type: string
        required: false
        default: ""
      total-runs:
        description: "Expected number of test runs"
        type: string
        required: true
    secrets:
      SLACK_FLAKY_TESTS_ALERT_WEBHOOK_URL:
        description: "Incoming Slack webhook URL for flaky tests alerts"
        required: false

jobs:
  flaky-tests-analysis:
    name: Flaky Tests Analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Download JUnit reports artifacts
        id: download-reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: junit-reports
          pattern: ${{ inputs.junit-artifact-pattern }}
      - name: Analyze Flaky Tests and Generate Summary
        id: analyze
        working-directory: hack/flaky_tests_analysis
        run: |
          process_runs() {
            local reports_dir="$1"
            local failed_dir="$2"

            mkdir -p "$failed_dir"
            TOTAL_COMPLETED=0
            FAILED_RUNS=0

            # Each subdirectory represents one run (one matrix job).
            # A run may produce multiple XML files (one per test module).
            for dir in "$reports_dir"/*/; do
              if [ -d "$dir" ] && ls "$dir"/*.xml >/dev/null 2>&1; then
                TOTAL_COMPLETED=$((TOTAL_COMPLETED + 1))
                # A run is considered failed if any of its XML files reports failures
                if grep -ql 'failures="[1-9]' "$dir"/*.xml 2>/dev/null; then
                  local run_name
                  FAILED_RUNS=$((FAILED_RUNS + 1))
                  run_name="$(basename "$dir")"
                  mkdir -p "$failed_dir/$run_name"
                  cp "$dir"/*.xml "$failed_dir/$run_name/"
                fi
              fi
            done
          }

          write_stability_summary() {
            local total_completed="$1" failed_runs="$2" expected_runs="$3" failure_percentage="$4"
            local missing_runs

            missing_runs=$((expected_runs - total_completed))

            echo "### 📊 ${{ inputs.suite-name }} Suite Stability Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Failure rate:** ${failure_percentage}% (${failed_runs}/${total_completed} completed runs had failures)" >> $GITHUB_STEP_SUMMARY
            if [ "$missing_runs" -gt 0 ]; then
              echo "**Runners without results:** ${missing_runs}/${expected_runs}" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
          }

          flatten_reports() {
            local reports_dir="$1" flat_dir="$2"

            mkdir -p "$flat_dir"
            find "$reports_dir" -name '*.xml' -exec cp {} "$flat_dir/" \;
          }

          setup_analysis_env() {
            make venv-create
            source .venv/bin/activate
            make install-deps
          }

          run_analysis() {
            local reports_path="$1"

            make PATH-TO-JUNIT-FILES="$reports_path" analyze-files 2>&1 | tail -n +2
          }

          write_flaky_tests_summary() {
            local flaky_test_list="$1"
            local num_flaky_tests

            num_flaky_tests=$(( $(echo -n "$flaky_test_list" | grep -c . || true) - 1 ))

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Flaky Tests Analysis" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Unique flaky tests reported:** **$num_flaky_tests**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$num_flaky_tests" -gt 0 ]; then
              echo "<details><summary>Click to see the full list of flaky tests</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$flaky_test_list" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            fi
          }

          REPORTS_DIR="${{ steps.download-reports.outputs.download-path }}"
          FLAT_DIR="$RUNNER_TEMP/junit-reports-flat"
          FAILED_DIR="$RUNNER_TEMP/failed-junit-reports"
          EXPECTED_RUNS=${{ inputs.total-runs }}
          FAILURE_RATE_THRESHOLD="${{ env.FLAKY_TESTS_FAILURE_RATE_THRESHOLD }}"

          process_runs "$REPORTS_DIR" "$FAILED_DIR"

          if [ "$(ls -A "$FAILED_DIR" 2>/dev/null)" ]; then
            echo "has-failed-reports=true" >> $GITHUB_OUTPUT
            echo "failed-reports-dir=$FAILED_DIR" >> $GITHUB_OUTPUT
          else
            echo "has-failed-reports=false" >> $GITHUB_OUTPUT
          fi

          echo "failure-rate-exceeded=false" >> $GITHUB_OUTPUT
          if [ "$TOTAL_COMPLETED" -gt 0 ]; then
            FAILURE_PERCENTAGE=$(echo "scale=1; $FAILED_RUNS * 100 / $TOTAL_COMPLETED" | bc)
            FAILURE_RATE_EXCEEDED=$(echo "$FAILURE_PERCENTAGE > $FAILURE_RATE_THRESHOLD" | bc -l)

            write_stability_summary "$TOTAL_COMPLETED" "$FAILED_RUNS" "$EXPECTED_RUNS" "$FAILURE_PERCENTAGE"
            echo "failure-percentage=$FAILURE_PERCENTAGE" >> $GITHUB_OUTPUT
            echo "failure-rate-exceeded=$([ "$FAILURE_RATE_EXCEEDED" -eq 1 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          fi

          flatten_reports "$REPORTS_DIR" "$FLAT_DIR"

          setup_analysis_env
          FLAKY_TEST_LIST=$(run_analysis "$FLAT_DIR")

          write_flaky_tests_summary "$FLAKY_TEST_LIST"

          generate_dashboard_json() {
            local total_completed="$1" failed_runs="$2" expected_runs="$3"
            local flaky_test_list="$4"
            local output_file="suite-results.json"

            local num_flaky_tests
            num_flaky_tests=$(( $(echo -n "$flaky_test_list" | grep -c . || true) - 1 ))
            if [ "$num_flaky_tests" -lt 0 ]; then
              num_flaky_tests=0
            fi

            local top_flaky_tests="[]"
            if [ "$num_flaky_tests" -gt 0 ]; then
               top_flaky_tests=$(echo "$flaky_test_list" | tail -n +2 | jq -R -s -c '
                 split("\n") | map(select(contains(" --- score: "))) | map(
                   split(" --- score: ") | {name: .[0], score: (.[1] | tonumber)}
                 )')
            fi

            jq -n \
              --arg timestamp "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
              --arg commit "${{ github.sha }}" \
              --arg run_id "${{ github.run_id }}" \
              --arg suite "${{ inputs.suite-name }}" \
              --argjson completed "$total_completed" \
              --argjson failed "$failed_runs" \
              --argjson top_flaky_tests "$top_flaky_tests" \
              '{
                timestamp: $timestamp,
                commit: $commit,
                run_id: $run_id,
                suite: $suite,
                metrics: {
                  completed_runs: $completed,
                  failed_runs: $failed
                },
                top_flaky_tests: $top_flaky_tests
              }' > "$output_file"
          }

          if [ "${{ github.event_name }}" = "schedule" ]; then
             generate_dashboard_json "$TOTAL_COMPLETED" "$FAILED_RUNS" "$EXPECTED_RUNS" "$FLAKY_TEST_LIST"
          fi

      - name: Send Slack alert
        if: github.event_name == 'schedule' && fromJson(steps.analyze.outputs.failure-rate-exceeded)
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          webhook: ${{ secrets.SLACK_FLAKY_TESTS_ALERT_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: ":warning: *Flaky tests failure rate threshold exceeded*\n*Suite:* ${{ inputs.suite-name }}\n*Failure rate:* ${{ steps.analyze.outputs.failure-percentage }}%"

      - name: Download screenshot artifacts
        id: download-screenshots
        if: inputs.screenshot-artifact-pattern != '' && fromJson(steps.analyze.outputs.has-failed-reports)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: screenshot-artifacts
          pattern: ${{ inputs.screenshot-artifact-pattern }}
      - name: Build aggregated evidence artifact
        id: build-evidence
        if: fromJson(steps.analyze.outputs.has-failed-reports)
        run: |
          set -euo pipefail

          copy_artifacts() {
            local source_dir="$1"
            local pattern="$2"
            local target_name="$3"

            [ -n "$pattern" ] || return 0
            [ -d "$source_dir" ] || return 0

            local prefix="${pattern%\*}"

            shopt -s nullglob
            for artifact_dir in "$source_dir"/*; do
              [ -d "$artifact_dir" ] || continue

              local artifact_name run_dir
              artifact_name="$(basename "$artifact_dir")"
              run_dir="${artifact_name#"$prefix"}"

              mkdir -p "$BUNDLE_DIR/$run_dir/$target_name"
              cp -R "$artifact_dir"/. "$BUNDLE_DIR/$run_dir/$target_name/"
            done
            shopt -u nullglob
          }

          WORKFLOW_SLUG="$(echo '${{ github.workflow }}' | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g')"
          SUITE_SLUG="$(echo '${{ inputs.suite-name }}' | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g')"
          BUNDLE_DIR="$RUNNER_TEMP/evidence"
          rm -rf "$BUNDLE_DIR"
          mkdir -p "$BUNDLE_DIR"

          copy_artifacts "${{ steps.analyze.outputs.failed-reports-dir }}" "${{ inputs.junit-artifact-pattern }}" "junit"
          copy_artifacts "${{ steps.download-screenshots.outputs.download-path }}" "${{ inputs.screenshot-artifact-pattern }}" "screenshots"

          if [ -n "$(find "$BUNDLE_DIR" -mindepth 2 -type f -print -quit)" ]; then
            echo "bundle-dir=$BUNDLE_DIR" >> "$GITHUB_OUTPUT"
            echo "artifact-name=evidence-${WORKFLOW_SLUG}-${SUITE_SLUG}-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "No evidence files were collected for the aggregated artifact."
          fi
      - name: Upload aggregated evidence artifact
        if: steps.build-evidence.outputs.bundle-dir != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.build-evidence.outputs.artifact-name }}
          path: ${{ steps.build-evidence.outputs.bundle-dir }}
          retention-days: 15
      - name: Delete JUnit artifacts
        uses: geekyeggo/delete-artifact@176a747ab7e287e3ff4787bf8a148716375ca118 # v6
        with:
          name: ${{ inputs.junit-artifact-pattern }}
          failOnError: false
      - name: Delete screenshot artifacts
        if: inputs.screenshot-artifact-pattern != '' && steps.build-evidence.outputs.bundle-dir != ''
        uses: geekyeggo/delete-artifact@176a747ab7e287e3ff4787bf8a148716375ca118 # v6
        with:
          name: ${{ inputs.screenshot-artifact-pattern }}
          failOnError: false

      - name: Checkout gh-pages for update
        if: github.event_name == 'schedule'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: gh-pages
          path: dashboard-site

      - name: Update history.json
        if: github.event_name == 'schedule'
        run: |
          HISTORY_FILE="dashboard-site/flaky-tests/data/history.json"
          NEW_DATA="hack/flaky_tests_analysis/suite-results.json"

          # Configuration for history retention
          DAYS_TO_KEEP=45
          SUITES_COUNT=5
          MAX_ENTRIES=$((DAYS_TO_KEEP * SUITES_COUNT))

          if [ -f "$NEW_DATA" ]; then
            echo "Updating history with $NEW_DATA (Retention: last $MAX_ENTRIES entries)"
            if [ ! -f "$HISTORY_FILE" ]; then echo "[]" > "$HISTORY_FILE"; fi
            
            # Append new data and keep only the last N entries
            jq ". + [$(cat "$NEW_DATA")] | .[-$MAX_ENTRIES:]" "$HISTORY_FILE" > "$HISTORY_FILE.tmp" && mv "$HISTORY_FILE.tmp" "$HISTORY_FILE"
          else
            echo "No new data to update history with."
          fi

      - name: Commit and push changes
        if: github.event_name == 'schedule'
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          branch: gh-pages
          repository: dashboard-site
          commit_message: "docs: update flaky tests history for ${{ inputs.suite-name }}"
          file_pattern: "flaky-tests/data/history.json"
