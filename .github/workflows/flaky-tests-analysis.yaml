name: Flaky Tests Analysis

on:
  workflow_call:
    inputs:
      suite-name:
        description: "Summary heading (e.g., E2E, Jest, Backend)"
        type: string
        required: true
      junit-artifact-pattern:
        description: "Download pattern for JUnit reports"
        type: string
        required: true
      total-runs:
        description: "Expected number of test runs"
        type: string
        required: true

jobs:
  flaky-tests-analysis:
    name: Flaky Tests Analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download JUnit reports artifacts
        id: download-reports
        uses: actions/download-artifact@v8
        with:
          path: junit-reports
          pattern: ${{ inputs.junit-artifact-pattern }}
      - name: Analyze Flaky Tests and Generate Summary
        id: analyze
        working-directory: hack/flaky_tests_analysis
        run: |
          process_runs() {
            local reports_dir="$1"
            local failed_dir="$2"

            mkdir -p "$failed_dir"
            TOTAL_COMPLETED=0
            FAILED_RUNS=0

            # Each subdirectory represents one run (one matrix job).
            # A run may produce multiple XML files (one per test module).
            for dir in "$reports_dir"/*/; do
              if [ -d "$dir" ] && ls "$dir"/*.xml >/dev/null 2>&1; then
                TOTAL_COMPLETED=$((TOTAL_COMPLETED + 1))
                # A run is considered failed if any of its XML files reports failures
                if grep -ql 'failures="[1-9]' "$dir"/*.xml 2>/dev/null; then
                  FAILED_RUNS=$((FAILED_RUNS + 1))
                  cp "$dir"/*.xml "$failed_dir/"
                fi
              fi
            done
          }

          write_stability_summary() {
            local total_completed="$1" failed_runs="$2" expected_runs="$3"
            local failure_percentage missing_runs

            failure_percentage=$(echo "scale=1; $failed_runs * 100 / $total_completed" | bc)
            missing_runs=$((expected_runs - total_completed))

            echo "### 📊 ${{ inputs.suite-name }} Suite Stability Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Failure rate:** ${failure_percentage}% (${failed_runs}/${total_completed} completed runs had failures)" >> $GITHUB_STEP_SUMMARY
            if [ "$missing_runs" -gt 0 ]; then
              echo "**Runners without results:** ${missing_runs}/${expected_runs}" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
          }

          flatten_reports() {
            local reports_dir="$1" flat_dir="$2"

            mkdir -p "$flat_dir"
            find "$reports_dir" -name '*.xml' -exec cp {} "$flat_dir/" \;
          }

          setup_analysis_env() {
            make venv-create
            source .venv/bin/activate
            make install-deps
          }

          run_analysis() {
            local reports_path="$1"

            make PATH-TO-JUNIT-FILES="$reports_path" analyze-files 2>&1 | tail -n +2
          }

          write_flaky_tests_summary() {
            local flaky_test_list="$1"
            local num_flaky_tests

            num_flaky_tests=$(( $(echo -n "$flaky_test_list" | grep -c . || true) - 1 ))

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Flaky Tests Analysis" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Unique flaky tests reported:** **$num_flaky_tests**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$num_flaky_tests" -gt 0 ]; then
              echo "<details><summary>Click to see the full list of flaky tests</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$flaky_test_list" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            fi
          }

          REPORTS_DIR="${{ steps.download-reports.outputs.download-path }}"
          FLAT_DIR="$RUNNER_TEMP/junit-reports-flat"
          FAILED_DIR="$RUNNER_TEMP/failed-junit-reports"
          EXPECTED_RUNS=${{ inputs.total-runs }}

          process_runs "$REPORTS_DIR" "$FAILED_DIR"

          if [ "$(ls -A "$FAILED_DIR" 2>/dev/null)" ]; then
            echo "has-failed-reports=true" >> $GITHUB_OUTPUT
            echo "failed-reports-dir=$FAILED_DIR" >> $GITHUB_OUTPUT
          else
            echo "has-failed-reports=false" >> $GITHUB_OUTPUT
          fi

          if [ "$TOTAL_COMPLETED" -gt 0 ]; then
            write_stability_summary "$TOTAL_COMPLETED" "$FAILED_RUNS" "$EXPECTED_RUNS"
          fi

          flatten_reports "$REPORTS_DIR" "$FLAT_DIR"

          setup_analysis_env
          FLAKY_TEST_LIST=$(run_analysis "$FLAT_DIR")

          write_flaky_tests_summary "$FLAKY_TEST_LIST"

          generate_dashboard_json() {
            local total_completed="$1" failed_runs="$2" expected_runs="$3"
            local flaky_test_list="$4"
            local output_file="suite-results.json"

            local num_flaky_tests
            num_flaky_tests=$(( $(echo -n "$flaky_test_list" | grep -c . || true) - 1 ))
            if [ "$num_flaky_tests" -lt 0 ]; then
              num_flaky_tests=0
            fi

            local top_flaky_tests="[]"
            if [ "$num_flaky_tests" -gt 0 ]; then
               top_flaky_tests=$(echo "$flaky_test_list" | tail -n +2 | jq -R -s -c '
                 split("\n") | map(select(contains(" --- score: "))) | map(
                   split(" --- score: ") | {name: .[0], score: (.[1] | tonumber)}
                 )')
            fi

            jq -n \
              --arg timestamp "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
              --arg commit "${{ github.sha }}" \
              --arg run_id "${{ github.run_id }}" \
              --arg suite "${{ inputs.suite-name }}" \
              --argjson completed "$total_completed" \
              --argjson failed "$failed_runs" \
              --argjson top_flaky_tests "$top_flaky_tests" \
              '{
                timestamp: $timestamp,
                commit: $commit,
                run_id: $run_id,
                suite: $suite,
                metrics: {
                  completed_runs: $completed,
                  failed_runs: $failed
                },
                top_flaky_tests: $top_flaky_tests
              }' > "$output_file"
          }

          if [ "${{ github.event_name }}" = "schedule" ]; then
             generate_dashboard_json "$TOTAL_COMPLETED" "$FAILED_RUNS" "$EXPECTED_RUNS" "$FLAKY_TEST_LIST"
          fi

      - name: Delete artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: ${{ inputs.junit-artifact-pattern }}
          failOnError: false
      - name: Compute artifact name
        id: artifact-name
        run: echo "value=failed-$(echo '${{ inputs.junit-artifact-pattern }}' | sed 's/-\*$//')" >> $GITHUB_OUTPUT
      - name: Upload failed JUnit reports
        if: fromJson(steps.analyze.outputs.has-failed-reports)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact-name.outputs.value }}
          path: ${{ steps.analyze.outputs.failed-reports-dir }}
          retention-days: 7

      - name: Checkout gh-pages for update
        if: github.event_name == 'schedule'
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: dashboard-site

      - name: Update history.json
        if: github.event_name == 'schedule'
        run: |
          HISTORY_FILE="dashboard-site/flaky-tests/data/history.json"
          NEW_DATA="hack/flaky_tests_analysis/suite-results.json"

          # Configuration for history retention
          DAYS_TO_KEEP=45
          SUITES_COUNT=5
          MAX_ENTRIES=$((DAYS_TO_KEEP * SUITES_COUNT))

          if [ -f "$NEW_DATA" ]; then
            echo "Updating history with $NEW_DATA (Retention: last $MAX_ENTRIES entries)"
            if [ ! -f "$HISTORY_FILE" ]; then echo "[]" > "$HISTORY_FILE"; fi
            
            # Append new data and keep only the last N entries
            jq ". + [$(cat "$NEW_DATA")] | .[-$MAX_ENTRIES:]" "$HISTORY_FILE" > "$HISTORY_FILE.tmp" && mv "$HISTORY_FILE.tmp" "$HISTORY_FILE"
          else
            echo "No new data to update history with."
          fi

      - name: Commit and push changes
        if: github.event_name == 'schedule'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: gh-pages
          repository: dashboard-site
          commit_message: "docs: update flaky tests history for ${{ inputs.suite-name }}"
          file_pattern: "flaky-tests/data/history.json"
