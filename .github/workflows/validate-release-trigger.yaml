name: Validate Release Trigger PR

on:
  pull_request:
    branches:
      - release
    paths:
      - VERSION
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  validate:
    name: Validate version-trigger PR
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Only one version-trigger PR at a time
        run: |
          set -euo pipefail
          mapfile -t open_nums < <(gh pr list \
            --base release --state open \
            --json number --jq '.[].number')

          matching=()
          for num in "${open_nums[@]}"; do
            if gh pr view "$num" --json files --jq '.files[].path' | grep -qx VERSION; then
              matching+=("$num")
            fi
          done

          if [ "${#matching[@]}" -gt 1 ]; then
            echo "::error::More than one PR against 'release' modifies VERSION:"
            for num in "${matching[@]}"; do
              gh pr view "$num" --json number,title,headRefName \
                --jq '"  #\(.number) \(.title) (head: \(.headRefName))"'
            done
            exit 1
          fi

      - name: Only the VERSION file may change
        run: |
          set -euo pipefail
          git fetch origin release
          mapfile -t changed < <(git diff --name-only origin/release...HEAD)
          if [ "${#changed[@]}" -ne 1 ] || [ "${changed[0]}" != "VERSION" ]; then
            echo "::error::This PR must modify only the VERSION file. Changed files:"
            printf '  %s\n' "${changed[@]}"
            exit 1
          fi

      - name: No other PR against 'release' may be open
        env:
          PR_HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          others=$(gh pr list \
            --base release --state open \
            --json number,title,headRefName \
            --jq '[.[] | select(.headRefName != env.PR_HEAD_REF)]')
          count=$(echo "$others" | jq 'length')
          if [ "$count" -gt 0 ]; then
            echo "::error::Cannot finalize the release: ${count} other PR(s) are still open against 'release'."
            echo "$others" | jq -r '.[] | "  #\(.number) \(.title) (head: \(.headRefName))"'
            echo "Merge or close them, then re-run this workflow from the Actions tab."
            exit 1
          fi
